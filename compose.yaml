services:
  app:
    build: .
    container_name: epidauros_app
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8501:8501"
    command: sleep infinity
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/epidauros
      - QDRANT_HOST=qdrant
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - qdrant

  postgres:
      image: postgres:17-alpine
      container_name: epidauros_postgres
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=password
        - POSTGRES_DB=epidauros
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: epidauros_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/var/lib/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
